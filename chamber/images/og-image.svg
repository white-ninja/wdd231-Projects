<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#006ba6"/>
      <stop offset="1" stop-color="#00b4d8"/>
    </linearGradient>
    <style>
      .title { fill: #fff; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 700; font-size: 72px; }
      .sub { fill: rgba(255,255,255,0.85); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 36px; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="220" class="title">OtaCity Chamber</text>
  <text x="60" y="300" class="sub">Membership Directory</text>
  <rect x="60" y="360" width="158" height="10" fill="#ffb703" rx="5"/>
